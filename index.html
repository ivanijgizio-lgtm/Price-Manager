<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Price Manager Pro + SENDER</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #2f5cff;
      --secondary: #0f172a;
      --accent: #22c55e;
      --accent-pink: #ec4899;

      --bg: #0b1220;
      --surface: #0f172a;
      --surface-2: #111827;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #1f2937;

      --shadow-soft: 8px 8px 18px rgba(0,0,0,0.35), -6px -6px 16px rgba(255,255,255,0.02);
      --shadow-inset: inset 6px 6px 12px rgba(0,0,0,0.4), inset -6px -6px 12px rgba(255,255,255,0.02);

      --radius: 14px;
      --transition: all .2s ease;
    }

    body {
      margin:0;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    * { box-sizing: border-box; }

    body.theme-ocean { --bg:#0b1220; --surface:#0f172a; --surface-2:#111827; }
    body.theme-sand {
      --bg:#f6f5f2; --surface:#f0ede8; --surface-2:#e6e0d8;
      --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --shadow-soft: 8px 8px 18px rgba(0,0,0,0.08), -6px -6px 14px rgba(255,255,255,0.7);
      --shadow-inset: inset 6px 6px 12px rgba(0,0,0,0.08), inset -6px -6px 12px rgba(255,255,255,0.9);
    }
    body.theme-graphite { --bg:#111827; --surface:#1f2937; --surface-2:#111827; }

    .login-page {
      display:flex; align-items:center; justify-content:center;
      height:100vh; background: linear-gradient(135deg, var(--primary), var(--accent-pink));
    }
    .login-box {
      background: var(--surface); padding: 36px; border-radius: var(--radius);
      box-shadow: var(--shadow-soft); width:100%; max-width:420px;
    }
    .login-box h1 {
      text-align:center; font-size:24px; margin-bottom:24px;
      background: linear-gradient(135deg, var(--primary), var(--accent-pink));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    input, select, textarea {
      width:100%; padding:10px 12px;
      background: var(--surface-2); border:1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size:14px;
      outline:none; box-shadow: var(--shadow-inset); transition: var(--transition);
    }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(47,92,255,0.2); }

    .btn { padding: 10px 18px; border:none; border-radius: 10px; font-weight:600; cursor:pointer; transition: var(--transition); }
    .btn-primary { background: var(--primary); color:white; }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-danger { background:#ef4444; color:white; }
    .btn-ghost { background: transparent; border:1px solid var(--border); color: var(--text); }

    .app { display:none; height:100vh; flex-direction:column; }
    .app.active { display:flex; }

    .header {
      display:flex; justify-content:space-between; align-items:center;
      padding: 14px 24px; background: var(--surface);
      border-bottom:1px solid var(--border); box-shadow: var(--shadow-soft);
    }
    .logo {
      font-weight:700; font-size:18px;
      background: linear-gradient(135deg, var(--primary), var(--accent-pink));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .header-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

    .content-wrapper { display:flex; flex:1; overflow:hidden; }
    .sidebar {
      width:240px; background: var(--surface);
      border-right:1px solid var(--border); overflow-y:auto;
      padding: 12px 0; box-shadow: var(--shadow-soft);
    }
    .menu-item {
      padding: 10px 18px; cursor:pointer; color: var(--muted);
      border-left:3px solid transparent; transition: var(--transition);
    }
    .menu-item:hover { color: var(--primary); background: rgba(47,92,255,.08); }
    .menu-item.active { color: var(--primary); border-left-color: var(--primary); background: rgba(47,92,255,.12); }

    .content { flex:1; overflow-y:auto; padding:24px; }
    .section { display:none; }
    .section.active { display:block; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; margin-bottom: 18px;
      box-shadow: var(--shadow-soft);
    }
    .card-title { font-weight:700; margin-bottom:12px; }

    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { padding:8px; border-bottom:1px solid var(--border); }

    .toast {
      position: fixed; right: 16px; bottom: 16px;
      background: var(--surface); padding: 14px 18px;
      border-left: 4px solid var(--accent); border-radius: 10px;
      box-shadow: var(--shadow-soft); z-index: 9999;
    }
    .toast.error { border-left-color: #ef4444; }

    /* Messenger */
    .chat-shell {
      display:grid; grid-template-columns: 280px 1fr;
      height: 560px; border-radius: var(--radius);
      overflow:hidden; box-shadow: var(--shadow-soft); border:1px solid var(--border);
    }
    .chat-sidebar {
      background: var(--surface-2);
      border-right:1px solid var(--border);
      display:flex; flex-direction:column;
    }
    .chat-sidebar .head {
      padding:12px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .chat-list { flex:1; overflow-y:auto; }
    .chat-item {
      padding:12px 16px; cursor:pointer; transition: var(--transition);
    }
    .chat-item.active { background: rgba(47,92,255,.12); color: var(--primary); }
    .chat-main { display:flex; flex-direction:column; }
    .chat-header {
      padding:12px 16px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between;
    }
    .chat-messages {
      flex:1; padding:16px; overflow-y:auto; background: var(--surface-2);
    }
    .message {
      padding:10px 12px; margin-bottom:10px;
      max-width:70%; border-radius:14px;
      box-shadow: var(--shadow-soft);
      word-break: break-word;
    }
    .message.me { margin-left:auto; background: rgba(47,92,255,.15); }
    .message.other { background: var(--surface); }
    .message .meta { font-size:11px; color: var(--muted); margin-bottom:4px; }
    .chat-input-area {
      display:flex; gap:8px; padding:12px;
      border-top:1px solid var(--border); background: var(--surface);
      align-items: center;
    }
    .emoji-picker {
      position: absolute; bottom: 70px; left: 12px;
      background: var(--surface); border:1px solid var(--border);
      padding:10px; border-radius: 12px; display:none;
      gap:6px; flex-wrap:wrap;
      box-shadow: var(--shadow-soft);
    }
    .emoji-btn {
      width:34px; height:34px; border-radius:10px; border:none;
      background: var(--surface-2); cursor:pointer;
    }
    .file-label {
      padding:8px 10px; border:1px dashed var(--border);
      border-radius:10px; cursor:pointer; font-size:12px;
    }
    .file-name { font-size:12px; color: var(--accent); margin-top:4px; }

    @media (max-width: 900px) {
      .content-wrapper { flex-direction:column; }
      .sidebar { width:100%; display:flex; overflow-x:auto; }
      .menu-item { white-space:nowrap; border-left:none; border-bottom:3px solid transparent; }
      .menu-item.active { border-bottom-color: var(--primary); }
      .chat-shell { grid-template-columns:1fr; }
    }
  </style>
</head>
<body class="theme-ocean">

  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h1>💎 Price Manager Pro</h1>
      <div class="form-group">
        <label>Email</label>
        <input id="loginEmail" type="email" value="admin@example.com"/>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input id="loginPassword" type="password" value="admin123"/>
      </div>
      <button class="btn btn-primary" id="loginBtn" style="width:100%;margin-top:10px;">Вход</button>
    </div>
  </div>

  <div id="mainApp" class="app">
    <div class="header">
      <div class="logo">⚙️ Price Manager Pro</div>
      <div class="header-right">
        <select id="themeSelect">
          <option value="theme-ocean">Океан</option>
          <option value="theme-sand">Песок</option>
          <option value="theme-graphite">Графит</option>
        </select>
        <div id="userName">Администратор</div>
        <button class="btn btn-danger" id="logoutBtn">Выход</button>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="sidebar">
        <div class="menu-item active" data-section="dashboard">📊 Дашборд</div>
        <div class="menu-item" data-section="search">🔍 Поиск</div>
        <div class="menu-item" data-section="compare">⚖️ Сравнение</div>
        <div class="menu-item" data-section="matrix">📋 Матрица</div>
        <div class="menu-item" data-section="analytics">📈 Аналитика</div>
        <div class="menu-item" data-section="assistant">🤖 AI</div>
        <div class="menu-item" data-section="logistics">🚚 Логистика</div>
        <div class="menu-item" data-section="gantt">📅 Gantt</div>
        <div class="menu-item" data-section="upload">📤 Загрузка</div>
        <div class="menu-item" data-section="insights">💡 Insights</div>
        <div class="menu-item" data-section="messenger">💬 SENDER</div>
      </div>

      <div class="content">
        <section id="dashboard" class="section active">
          <div class="card">
            <div class="card-title">⭐ Лучшие цены (Top 10)</div>
            <table>
              <thead><tr><th>Product</th><th>Компания</th><th>Цена</th><th>Медиана</th><th>Target</th><th>Статус</th></tr></thead>
              <tbody id="topPricesList"></tbody>
            </table>
          </div>
        </section>

        <section id="messenger" class="section">
          <div class="card">
            <div class="card-title">💬 SENDER — единый центр коммуникаций</div>
            <div class="chat-shell">
              <aside class="chat-sidebar">
                <div class="head">
                  <strong>Чаты</strong>
                  <div>
                    <button class="btn btn-primary" id="addChatBtn">+</button>
                  </div>
                </div>
                <div class="chat-list" id="chatList"></div>
              </aside>

              <section class="chat-main">
                <div class="chat-header">
                  <div>
                    <div id="chatTitle">Чат</div>
                    <div id="chatMembers" style="font-size:12px;color:var(--muted);"></div>
                  </div>
                  <div style="font-size:12px;color:var(--muted);">Демо-режим</div>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input-area">
                  <div style="position:relative;">
                    <div class="emoji-picker" id="emojiPicker"></div>
                    <button class="btn btn-ghost" id="emojiToggle">😀</button>
                  </div>
                  <textarea id="messageInput" placeholder="Напишите сообщение..."></textarea>
                  <div>
                    <label class="file-label">
                      📎
                      <input type="file" id="fileInput" style="display:none"/>
                    </label>
                    <div id="fileName" class="file-name"></div>
                  </div>
                  <button class="btn btn-primary" id="sendBtn">➤</button>
                </div>
              </section>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    class StorageService {
      static get(key, fallback = null) {
        try { return JSON.parse(localStorage.getItem(key)) || fallback; }
        catch { return fallback; }
      }
      static set(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} }
      static remove(key){ try { localStorage.removeItem(key); } catch {} }
    }

    class ThemeManager {
      constructor(selectEl){
        this.selectEl = selectEl;
        this.init();
      }
      init(){
        const saved = StorageService.get('theme', 'theme-ocean');
        document.body.className = saved;
        this.selectEl.value = saved;
        this.selectEl.addEventListener('change', () => {
          document.body.className = this.selectEl.value;
          StorageService.set('theme', this.selectEl.value);
        });
      }
    }

    class MessengerApp {
      constructor() {
        this.storageKey = 'senderData';
        this.currentUser = 'Вы';
        this.emojiList = ["😊","👍","🔥","📊","✅","🙌","🚀","💡","🤝","📌","⚡","📎","💬","📝"];
        this.data = StorageService.get(this.storageKey, {
          chats: [
            { id:'c1', name:'Алексей (разработчик)', type:'direct', members:['Вы','Алексей'], messages:[] },
            { id:'c2', name:'Отдел логистики', type:'group', members:['Вы','Ирина','Павел'], messages:[] },
            { id:'c3', name:'Отдел закупок', type:'group', members:['Вы','Ольга','Сергей'], messages:[] },
            { id:'c4', name:'Отдел развития', type:'group', members:['Вы','Дмитрий','Анна'], messages:[] }
          ],
          activeChatId: 'c1'
        });
      }

      init(){
        this.cache();
        this.renderEmoji();
        this.renderChats();
        this.selectChat(this.data.activeChatId);
        this.bind();
      }

      cache(){
        this.chatList = document.getElementById('chatList');
        this.chatTitle = document.getElementById('chatTitle');
        this.chatMembers = document.getElementById('chatMembers');
        this.chatMessages = document.getElementById('chatMessages');
        this.messageInput = document.getElementById('messageInput');
        this.sendBtn = document.getElementById('sendBtn');
        this.addChatBtn = document.getElementById('addChatBtn');
        this.fileInput = document.getElementById('fileInput');
        this.fileName = document.getElementById('fileName');
        this.emojiToggle = document.getElementById('emojiToggle');
        this.emojiPicker = document.getElementById('emojiPicker');
      }

      bind(){
        this.sendBtn.onclick = () => this.sendMessage();
        this.addChatBtn.onclick = () => this.createChat();
        this.fileInput.onchange = () => this.onFileSelected();
        this.emojiToggle.onclick = () => this.toggleEmoji();
        document.addEventListener('click', (e)=>{
          if(!e.target.closest('#emojiPicker') && !e.target.closest('#emojiToggle')){
            this.emojiPicker.style.display='none';
          }
        });
      }

      save(){ StorageService.set(this.storageKey, this.data); }

      renderEmoji(){
        this.emojiPicker.innerHTML = '';
        this.emojiList.forEach(e=>{
          const btn = document.createElement('button');
          btn.className = 'emoji-btn';
          btn.textContent = e;
          btn.onclick = ()=>this.insertEmoji(e);
          this.emojiPicker.appendChild(btn);
        });
      }

      toggleEmoji(){
        this.emojiPicker.style.display = this.emojiPicker.style.display === 'flex' ? 'none' : 'flex';
      }

      insertEmoji(emoji){
        const start = this.messageInput.selectionStart;
        const end = this.messageInput.selectionEnd;
        const text = this.messageInput.value;
        this.messageInput.value = text.substring(0,start)+emoji+text.substring(end);
        this.messageInput.focus();
      }

      renderChats(){
        this.chatList.innerHTML = '';
        this.data.chats.forEach(chat=>{
          const div = document.createElement('div');
          div.className = 'chat-item' + (chat.id===this.data.activeChatId?' active':'');
          div.textContent = chat.type==='group' ? '👥 '+chat.name : '👤 '+chat.name;
          div.onclick = () => this.selectChat(chat.id);
          this.chatList.appendChild(div);
        });
      }

      selectChat(id){
        this.data.activeChatId = id;
        this.renderChats();
        const chat = this.getActiveChat();
        this.chatTitle.textContent = chat.name;
        this.chatMembers.textContent = chat.members.join(', ');
        this.renderMessages();
        this.save();
      }

      getActiveChat(){
        return this.data.chats.find(c=>c.id===this.data.activeChatId);
      }

      renderMessages(){
        this.chatMessages.innerHTML = '';
        const chat = this.getActiveChat();
        chat.messages.forEach(msg=>{
          const div = document.createElement('div');
          div.className = 'message ' + (msg.author===this.currentUser ? 'me':'other');
          div.innerHTML = `
            <div class="meta">${msg.author} • ${msg.time}</div>
            <div>${msg.text || ''}</div>
            ${msg.file ? `<div style="margin-top:6px;font-size:12px;color:var(--accent);">📎 ${msg.file.name}</div>` : ''}
          `;
          this.chatMessages.appendChild(div);
        });
        this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
      }

      onFileSelected(){
        const file = this.fileInput.files[0];
        this.fileName.textContent = file ? file.name : '';
      }

      sendMessage(){
        const text = this.messageInput.value.trim();
        const file = this.fileInput.files[0];

        if(!text && !file) return;

        const msg = {
          author: this.currentUser,
          text: text,
          time: new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}),
          file: file ? { name: file.name, size: file.size } : null
        };

        const chat = this.getActiveChat();
        chat.messages.push(msg);
        this.messageInput.value = '';
        this.fileInput.value = '';
        this.fileName.textContent = '';
        this.renderMessages();
        this.save();

        this.autoReply(chat);
      }

      autoReply(chat){
        if(chat.type==='direct' && chat.name.includes('Алексей')){
          const replies = [
            'Принял ✅ Проверю данные.',
            'Отлично, посмотрю 📝',
            'Хорошо, свяжусь после анализа.',
            'Данные получил, начинаю работу.'
          ];
          setTimeout(()=>{
            chat.messages.push({
              author: 'Алексей',
              text: replies[Math.floor(Math.random()*replies.length)],
              time: new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})
            });
            this.renderMessages();
            this.save();
          }, 1000 + Math.random()*1500);
        } else if(chat.type==='group'){
          setTimeout(()=>{
            chat.messages.push({
              author: 'Система',
              text: 'Сообщение доставлено всем участникам ✅',
              time: new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})
            });
            this.renderMessages();
            this.save();
          }, 600);
        }
      }

      createChat(){
        const type = prompt("Тип чата: direct / group", "group");
        if(!type) return;
        const name = prompt("Название чата:");
        if(!name) return;
        const members = prompt("Участники (через запятую):", "Вы").split(',').map(m=>m.trim());
        const chat = {
          id: 'c'+Date.now(),
          name, type,
          members: members.length?members:['Вы'],
          messages:[]
        };
        this.data.chats.push(chat);
        this.selectChat(chat.id);
      }
    }

    class PriceManagerApp {
      constructor() {
        this.DB = StorageService.get('priceManagerDB', {
          companies: [], products: [], prices: {}, productNames: {},
          targetPrices: {}, medians: {}, logistics: [], ganttTasks: []
        });
        this.currentUser = StorageService.get('currentUserPM', null);
        this.init();
      }

      init(){
        this.cache();
        this.bind();
        if(this.currentUser) this.showMain(); else this.showLogin();
        new ThemeManager(this.themeSelect);
        this.messenger = new MessengerApp();
        this.messenger.init();
      }

      cache(){
        this.loginPage = document.getElementById('loginPage');
        this.mainApp = document.getElementById('mainApp');
        this.themeSelect = document.getElementById('themeSelect');
        this.loginBtn = document.getElementById('loginBtn');
        this.logoutBtn = document.getElementById('logoutBtn');
        this.loginEmail = document.getElementById('loginEmail');
        this.loginPassword = document.getElementById('loginPassword');
        this.userName = document.getElementById('userName');
      }

      bind(){
        this.loginBtn.onclick = () => this.handleLogin();
        this.logoutBtn.onclick = () => this.handleLogout();
        document.querySelectorAll('.menu-item').forEach(item => {
          item.addEventListener('click', () => {
            document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            item.classList.add('active');
            document.getElementById(item.dataset.section).classList.add('active');
          });
        });
      }

      showLogin(){ this.loginPage.style.display='flex'; this.mainApp.classList.remove('active'); }
      showMain(){ this.loginPage.style.display='none'; this.mainApp.classList.add('active'); if(this.currentUser) this.userName.textContent = this.currentUser.name; }

      handleLogin(){
        if(this.loginEmail.value==='admin@example.com' && this.loginPassword.value==='admin123'){
          this.currentUser = { name:'Администратор' };
          StorageService.set('currentUserPM', this.currentUser);
          this.showMain();
        } else alert('Неверные данные');
      }
      handleLogout(){
        StorageService.remove('currentUserPM');
        this.currentUser=null;
        this.showLogin();
      }
    }

    const app = new PriceManagerApp();
  </script>
</body>
</html>
